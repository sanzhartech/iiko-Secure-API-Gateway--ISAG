name: CI — ISAG Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: "ruff · backend"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Run Ruff
        working-directory: backend
        run: ruff check app tests
  test:
    name: "pytest · Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    # ── Service Containers ──────────────────────────────────────────────────
    # Redis is required for:
    #   - Rate limiting (SlowAPI + Redis storage)
    #   - JTI replay protection (SET NX EX)
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # ── Steps ───────────────────────────────────────────────────────────────
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      # Generate RSA keys so JWTValidator can load them at test time
      - name: Generate RSA test keys
        working-directory: backend
        run: python scripts/generate_keys.py

      # Write a minimal .env so pydantic-settings can initialise Settings
      - name: Write test .env
        working-directory: backend
        run: |
          cat > .env << 'EOF'
          APP_ENV=testing
          APP_DEBUG=false
          APP_HOST=0.0.0.0
          APP_PORT=8000
          JWT_PRIVATE_KEY_PATH=./keys/private.pem
          JWT_PUBLIC_KEY_PATH=./keys/public.pem
          JWT_PUBLIC_KEYS_PATH=./keys/public_keys.json
          JWT_ACTIVE_KID=default
          JWT_ALGORITHM=RS256
          JWT_ISSUER=isag.internal
          JWT_AUDIENCE=isag-clients
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES=15
          JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
          JWT_CLOCK_SKEW_SECONDS=60
          IIKO_API_BASE_URL=https://fake-iiko.internal
          IIKO_API_KEY=ci-upstream-key-placeholder
          GATEWAY_CLIENT_SECRET=ci-test-secret-placeholder-strictly-32c
          DATABASE_URL=sqlite+aiosqlite:////tmp/ci-gateway.db
          RATE_LIMIT_PER_IP=100/minute
          RATE_LIMIT_PER_USER=50/minute
          RATE_LIMIT_AUTH_ENDPOINT=10/minute
          CORS_ALLOWED_ORIGINS=http://localhost:3000
          LOG_LEVEL=WARNING
          LOG_FORMAT=json
          TRUSTED_PROXY_CIDRS=
          REDIS_URL=redis://localhost:6379/1
          EOF

      - name: Run test suite with coverage
        working-directory: backend
        env:
          TESTING: "1"
          REDIS_URL: "redis://localhost:6379/1"
        run: |
          pytest tests/ \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 14

  frontend:
    name: "frontend · lint + build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
