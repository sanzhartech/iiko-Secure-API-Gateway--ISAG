version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: isag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-isag_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
      POSTGRES_DB: ${POSTGRES_DB:-isag_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-isag_admin} -d ${POSTGRES_DB:-isag_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: isag-redis
    restart: unless-stopped
    command: >
      redis-server --save "" --appendonly no --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: isag-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_PUBLISH_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://isag_admin:change-me-postgres-password@db:5432/isag_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - APP_ENV=${APP_ENV:-production}
      - IIKO_API_BASE_URL=${IIKO_API_BASE_URL:-https://api-ru.iiko.services}
      - IIKO_API_KEY=${IIKO_API_KEY:-replace-with-real-iiko-key}
      - GATEWAY_CLIENT_SECRET=${GATEWAY_CLIENT_SECRET:-replace-with-strong-gateway-secret}
      - JWT_ACTIVE_KID=${JWT_ACTIVE_KID:-default}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      - CORS_ALLOW_CREDENTIALS=${CORS_ALLOW_CREDENTIALS:-true}
      - RATE_LIMIT_PER_IP=${RATE_LIMIT_PER_IP:-100/minute}
      - RATE_LIMIT_PER_USER=${RATE_LIMIT_PER_USER:-50/minute}
      - RATE_LIMIT_AUTH_ENDPOINT=${RATE_LIMIT_AUTH_ENDPOINT:-10/minute}
      - TRUSTED_PROXY_CIDRS=${TRUSTED_PROXY_CIDRS:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-replace-with-strong-admin-password}
    volumes:
      - ./backend/keys:/app/keys:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: isag-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PUBLISH_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: isag-prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "${PROMETHEUS_PUBLISH_PORT:-9090}:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: isag-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PUBLISH_PORT:-3000}:3000"
    volumes:
      # Связываем твою папку с настройками (provisioning) с контейнером
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-replace-with-strong-grafana-password}
    depends_on:
      - prometheus

volumes:
  postgres_data:
    name: isag_postgres_data
