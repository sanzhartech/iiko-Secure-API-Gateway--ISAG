version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: isag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-isag_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-isag_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-isag_admin} -d ${POSTGRES_DB:-isag_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: isag-redis
    restart: unless-stopped
    command: >
      redis-server --save "" --appendonly no --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: isag-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-isag_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-isag_db}
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=${APP_ENV:-production}
      - IIKO_API_BASE_URL=${IIKO_API_BASE_URL:-https://api-ru.iiko.services}
      - IIKO_API_KEY=${IIKO_API_KEY:?IIKO_API_KEY must be set in .env}
      - GATEWAY_CLIENT_SECRET=${GATEWAY_CLIENT_SECRET:?GATEWAY_CLIENT_SECRET must be set in .env}
      - JWT_ACTIVE_KID=${JWT_ACTIVE_KID:-default}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost}
      - CORS_ALLOW_CREDENTIALS=${CORS_ALLOW_CREDENTIALS:-false}
      - RATE_LIMIT_PER_IP=${RATE_LIMIT_PER_IP:-100/minute}
      - RATE_LIMIT_PER_USER=${RATE_LIMIT_PER_USER:-50/minute}
      - RATE_LIMIT_AUTH_ENDPOINT=${RATE_LIMIT_AUTH_ENDPOINT:-10/minute}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - ./backend/keys:/app/keys:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: isag-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: isag-prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: isag-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Связываем твою папку с настройками (provisioning) с контейнером
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set in .env}
    depends_on:
      - prometheus

volumes:
  postgres_data:
    name: isag_postgres_data
