services:
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iiko-secure-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Explicitly route SQLite to the persistent volume mount point
      - DATABASE_URL=sqlite+aiosqlite:////app/data/gateway.db
      - APP_ENV=production
    volumes:
      # Ephemeral or persistent sqlite database data store
      - gateway_data:/app/data
      # Mount external keys as read-only (Zero-Trust)
      - ./backend/keys:/app/keys:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

volumes:
  gateway_data:
    name: isag_gateway_data
