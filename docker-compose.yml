services:
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iiko-secure-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/gateway.db
      - APP_ENV=production
    volumes:
      - gateway_data:/app/data
      - ./backend/keys:/app/keys:ro
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: iiko-redis
    restart: unless-stopped
    command: >
      redis-server
      --save ""
      --appendonly no
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    # Не expose порт наружу — только внутренняя сеть

volumes:
  gateway_data:
    name: isag_gateway_data
