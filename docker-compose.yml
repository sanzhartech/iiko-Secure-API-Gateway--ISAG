services:
  db:
    image: postgres:15-alpine
    container_name: isag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: isag_admin
      POSTGRES_PASSWORD: isag_secure_password
      POSTGRES_DB: isag_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isag_admin -d isag_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: isag-redis
    restart: unless-stopped
    command: >
      redis-server --save "" --appendonly no --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: isag-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://isag_admin:isag_secure_password@db:5432/isag_db
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=production
      # Example dummy keys/secrets for quickstart
      - IIKO_API_BASE_URL=https://api-ru.iiko.services
      - IIKO_API_KEY=dummy_key
      - GATEWAY_CLIENT_SECRET=dummy_secret
      - JWT_ACTIVE_KID=default
      - RATE_LIMIT_PER_IP=100/minute
      - RATE_LIMIT_PER_USER=50/minute
      - RATE_LIMIT_AUTH_ENDPOINT=10/minute
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
    volumes:
      - ./backend/keys:/app/keys:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: isag-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    name: isag_postgres_data
