server {
    listen 80;
    server_name localhost;

    # [A6] Cap request body to match backend size validator (10 MB).
    client_max_body_size 10m;

    # [A6] Baseline security headers for served static assets.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # [A4] /metrics is intentionally NOT proxied to the public frontend.
    # Prometheus scrapes the backend directly over the internal Docker network
    # (see infrastructure/prometheus.yml). Exposing it here would leak
    # operational telemetry to anyone who can reach port 80.
}
