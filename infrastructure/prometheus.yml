global:
  scrape_interval: 15s        # Основной интервал сбора данных
  evaluation_interval: 15s
  scrape_timeout: 10s

# Настройки алертов (пусто для диплома)
alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  # -------------------------------------------------------------------
  # ISAG Gateway — основной источник метрик.
  # Бэкенд экспортирует данные на эндпоинт /metrics[cite: 1].
  # -------------------------------------------------------------------
  - job_name: "isag_gateway"
    scrape_interval: 5s       # Ускоренный сбор для демо-режима[cite: 2]
    metrics_path: /metrics    # Путь к метрикам FastAPI[cite: 1]
    static_configs:
      - targets:
          - "backend:8000"    # ИСПРАВЛЕНО: имя сервиса из твоего docker-compose[cite: 2]
        labels:
          environment: "production"
          service: "isag-gateway"